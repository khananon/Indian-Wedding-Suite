kind = "web"
previewPath = "/"
title = "Digital Wedding Invitations"
version = "1.0.0"
id = "artifacts/invitation-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20011

[services.development]
run = "pnpm --filter @workspace/invitation-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/invitation-site", "run", "build" ]
publicDir = "artifacts/invitation-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20011"
BASE_PATH = "/"
